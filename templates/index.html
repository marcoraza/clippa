<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippa</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.85);
      --text-muted: rgba(255,255,255,0.35);
      --text-ghost: rgba(255,255,255,0.15);
      --accent-start: #f97316;
      --accent-end: #ec4899;
      --accent-solid: #f97316;
      --success: #4ade80;
      --error: #f87171;
      --radius: 6px;
      --radius-sm: 3px;
      --font-body: "Space Grotesk", system-ui, sans-serif;
      --font-mono: "Space Mono", monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 50% 45%, rgba(249,115,22,0.07) 0%, transparent 100%),
        radial-gradient(ellipse 500px 350px at 50% 50%, rgba(236,72,153,0.05) 0%, transparent 100%);
      z-index: 0;
    }

    /* Subtle grid */
    .grid-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 64px 64px;
      z-index: 0;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%);
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 580px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* Brand */
    .brand {
      text-align: center;
    }

    .brand-name {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .brand-sub {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-ghost);
      margin-top: 4px;
    }

    /* Input bar */
    .input-bar {
      width: 100%;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-bar:focus-within {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 1px rgba(249,115,22,0.1), 0 8px 32px rgba(0,0,0,0.3);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #urls {
      flex: 1;
      min-width: 0;
      background: none;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text);
      letter-spacing: 0.02em;
      line-height: 1.6;
      height: 24px;
      overflow: hidden;
      transition: height 0.2s ease;
    }

    #urls::placeholder {
      color: var(--text-muted);
    }

    .input-bar.expanded #urls {
      height: auto;
      min-height: 60px;
    }

    .input-bar.expanded .input-row {
      flex-direction: column;
      align-items: stretch;
    }

    .inline-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .input-bar.expanded .inline-controls {
      display: none;
    }

    .expand-footer {
      display: none;
      border-top: 1px solid var(--border);
      margin-top: 14px;
      padding-top: 12px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .input-bar.expanded .expand-footer {
      display: flex;
    }

    /* Format toggle */
    .format-toggle {
      display: flex;
      gap: 2px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2px;
      flex-shrink: 0;
    }

    .format-btn {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: background 0.15s, color 0.15s;
    }

    .format-btn.active {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .format-btn:hover:not(.active) {
      color: rgba(255,255,255,0.5);
    }

    /* Fetch button */
    .fetch-btn {
      flex-shrink: 0;
      border: none;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .fetch-btn:hover { opacity: 0.9; }
    .fetch-btn:active { transform: scale(0.97); }
    .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .link-count {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* Platforms */
    .platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .platforms span {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-ghost);
      transition: color 0.2s;
      cursor: default;
    }

    .platforms span:hover {
      color: var(--text-muted);
    }

    /* Keyboard hint */
    .hint {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.1);
    }

    .hint kbd {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      padding: 2px 6px;
      font-family: inherit;
      font-size: inherit;
    }

    /* Cards */
    .cards {
      width: 100%;
      display: grid;
      gap: 8px;
    }

    .card {
      display: flex;
      gap: 14px;
      align-items: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: var(--border-hover);
    }

    .card-thumb {
      width: 96px;
      min-width: 96px;
      height: 64px;
      border-radius: 4px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-thumb.loading {
      background: rgba(255,255,255,0.03);
    }

    .no-thumb svg {
      width: 22px;
      height: 22px;
      opacity: 0.3;
    }

    .card-body {
      min-width: 0;
      flex: 1;
    }

    .card-title {
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 3px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .card-meta,
    .card-status,
    .card-error-url {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .card-error-msg,
    .card-status.error { color: var(--error); }
    .card-status.downloading { color: var(--accent-solid); }
    .card-status.done,
    .card-status.saved { color: var(--success); }

    .card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    .card-dl-btn,
    .q-chip,
    .dl-all-btn {
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }

    .card-dl-btn {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: #ffffff;
    }

    .card-dl-btn:hover { opacity: 0.9; }
    .card-dl-btn.done { background: var(--success); color: #0a0a0f; }
    .card-dl-btn.error { background: var(--error); color: #0a0a0f; }

    .q-chip {
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .q-chip.active {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border-color: var(--border-hover);
    }

    .q-chip:hover:not(.active) {
      border-color: var(--border-hover);
      color: rgba(255,255,255,0.5);
    }

    .card.card-error {
      border-color: rgba(248,113,113,0.2);
      background: rgba(248,113,113,0.03);
    }

    .card-error-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--error);
    }

    .card-error-icon svg {
      width: 20px;
      height: 20px;
    }

    .dl-all-bar {
      margin-top: 4px;
    }

    .dl-all-btn {
      width: 100%;
      padding: 10px 14px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: #ffffff;
    }

    .dl-all-btn:hover { opacity: 0.9; }
    .dl-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .loading-copy {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .loading-copy strong {
      color: var(--text);
      font-weight: 700;
    }

    .spin {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 24px 16px;
        gap: 24px;
      }

      .input-row {
        flex-wrap: wrap;
        gap: 10px;
      }

      #urls {
        width: 100%;
        font-size: 0.78rem;
      }

      .inline-controls {
        display: flex;
        width: 100%;
        gap: 8px;
      }

      .inline-controls .format-toggle {
        flex-shrink: 0;
      }

      .inline-controls .fetch-btn {
        flex: 1;
        text-align: center;
      }

      .expand-footer {
        flex-wrap: wrap;
        gap: 10px;
      }

      .expand-footer .fetch-btn {
        flex: 1;
        text-align: center;
      }

      .platforms {
        gap: 10px;
      }

      .platforms span {
        font-size: 0.5rem;
      }

      .card {
        flex-direction: column;
        align-items: stretch;
      }

      .card-thumb {
        width: 100%;
        min-width: 0;
        height: 160px;
      }

      .card-title {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid-bg"></div>

  <div class="shell">
    <div class="brand">
      <div class="brand-name">Clippa</div>
    </div>

    <div class="input-bar" id="inputBar">
      <div class="input-row">
        <textarea id="urls" placeholder="Cole um link..." rows="1"></textarea>
        <div class="inline-controls">
          <div class="format-toggle">
            <button class="format-btn active" data-format="video" onclick="setFormat(this)">MP4</button>
            <button class="format-btn" data-format="audio" onclick="setFormat(this)">MP3</button>
          </div>
          <button class="fetch-btn" id="goBtn" onclick="go()">Download</button>
        </div>
      </div>
      <div class="expand-footer">
        <div class="format-toggle">
          <button class="format-btn active" data-format="video" onclick="setFormat(this)">MP4</button>
          <button class="format-btn" data-format="audio" onclick="setFormat(this)">MP3</button>
        </div>
        <span class="link-count" id="linkCount"></span>
        <button class="fetch-btn" id="goBtnExpanded" onclick="go()">Download</button>
      </div>
    </div>

    <div class="platforms">
      <span>YouTube</span>
      <span>TikTok</span>
      <span>Instagram</span>
      <span>X</span>
      <span>Facebook</span>
      <span>Reddit</span>
      <span>Twitch</span>
      <span>SoundCloud</span>
      <span>Vimeo</span>
      <span>Pinterest</span>
    </div>

    <div class="hint"><kbd>Enter</kbd> buscar &nbsp; <kbd>Shift+Enter</kbd> nova linha</div>

    <div id="cards" class="cards"></div>
  </div>

  <script>
    let currentFormat = 'video';
    let cardData = [];
    const urlsEl = document.getElementById('urls');
    const inputBar = document.getElementById('inputBar');

    function setFormat(btn) {
      document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll(`.format-btn[data-format="${btn.dataset.format}"]`).forEach(b => b.classList.add('active'));
      currentFormat = btn.dataset.format;
      cardData.forEach((c, i) => { if (c.status === 'ready') renderCard(i); });
    }

    function parseUrls(text) {
      return [...new Set(text.split(/[\s,]+/).map(u => u.trim()).filter(u => u.startsWith('http')))];
    }

    function fmtDur(s) {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function friendlyError(err) {
      if (err.includes('Unsupported URL')) return 'Essa URL não é suportada';
      if (err.includes('Video unavailable')) return 'Este vídeo está indisponível ou privado';
      if (err.includes('Private video')) return 'Este vídeo é privado';
      if (err.includes('HTTP Error 403')) return 'A plataforma bloqueou o acesso';
      if (err.includes('HTTP Error 404')) return 'Vídeo não encontrado';
      if (err.includes('copyright')) return 'Vídeo bloqueado por copyright';
      if (err.includes('geo')) return 'Vídeo indisponível na sua região';
      if (err.includes('timed out') || err.includes('Timed out')) return 'A requisição expirou';
      if (err.includes('network') || err.includes('Network')) return 'Erro de rede';
      return err.length > 80 ? err.slice(0, 80) + '...' : err;
    }

    // Auto-expand input bar
    function updateInputBar() {
      const urls = parseUrls(urlsEl.value);
      const count = urls.length;
      const isMulti = count > 1 || urlsEl.value.includes('\n');

      if (isMulti) {
        inputBar.classList.add('expanded');
        urlsEl.style.height = 'auto';
        urlsEl.style.height = urlsEl.scrollHeight + 'px';
        document.getElementById('linkCount').textContent = `${count} link${count !== 1 ? 's' : ''} detectado${count !== 1 ? 's' : ''}`;
      } else {
        inputBar.classList.remove('expanded');
        urlsEl.style.height = '24px';
        document.getElementById('linkCount').textContent = '';
      }
    }

    urlsEl.addEventListener('input', updateInputBar);
    urlsEl.addEventListener('paste', () => setTimeout(updateInputBar, 0));

    urlsEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
    });

    async function go() {
      const urls = parseUrls(urlsEl.value);
      if (!urls.length) return;

      const btns = [document.getElementById('goBtn'), document.getElementById('goBtnExpanded')];
      const container = document.getElementById('cards');
      btns.forEach(b => { b.disabled = true; b.textContent = '...'; });
      container.innerHTML = '';
      cardData = [];

      for (let i = 0; i < urls.length; i++) {
        const url = urls[i];
        const idx = cardData.length;
        cardData.push({ url, status: 'loading' });
        renderCard(idx);

        btns.forEach(b => { b.textContent = urls.length > 1 ? `${i + 1}/${urls.length}...` : '...'; });

        try {
          const res = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (data.error) {
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
          } else {
            cardData[idx] = {
              ...cardData[idx],
              status: 'ready',
              title: data.title || '',
              thumbnail: data.thumbnail || '',
              duration: data.duration,
              uploader: data.uploader || '',
              formats: data.formats || [],
              selectedFormatId: data.formats?.[0]?.id || null,
            };
          }
        } catch (err) {
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: err.message };
        }
        renderCard(idx);
      }

      if (cardData.filter(c => c.status === 'ready').length > 1) {
        renderDownloadAll();
      }

      btns.forEach(b => { b.disabled = false; b.textContent = 'Download'; });
    }

    function renderCard(idx) {
      const c = cardData[idx];
      let el = document.getElementById(`card-${idx}`);
      if (!el) {
        el = document.createElement('div');
        el.id = `card-${idx}`;
        el.className = 'card';
        document.getElementById('cards').appendChild(el);
      }

      if (c.status === 'loading') {
        el.className = 'card';
        el.innerHTML = `
          <div class="card-thumb loading"></div>
          <div class="card-body">
            <div class="loading-copy"><strong>[ carregando ]</strong></div>
            <div class="card-meta">${esc(c.url)}</div>
          </div>
        `;
        return;
      }

      if (c.status === 'info-error') {
        el.className = 'card card-error';
        el.innerHTML = `
          <div class="card-thumb">
            <div class="card-error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title">Não foi possível buscar o vídeo</div>
            <div class="card-error-msg">${esc(friendlyError(c.error || ''))}</div>
            <div class="card-error-url">${esc(c.url)}</div>
          </div>
        `;
        return;
      }

      el.className = 'card';
      const isAudio = currentFormat === 'audio';

      let thumbHtml;
      if (isAudio) {
        thumbHtml = `<div class="no-thumb" style="color:var(--accent-solid)"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
      } else if (c.thumbnail) {
        thumbHtml = `<img src="${c.thumbnail}" alt="">`;
      } else {
        thumbHtml = `<div class="no-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8" cy="8" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
      }

      let qualityChips = '';
      if (!isAudio && c.formats && c.formats.length > 1) {
        qualityChips = c.formats.map(f =>
          `<button class="q-chip${f.id === c.selectedFormatId ? ' active' : ''}" onclick="pickFormat(${idx}, '${f.id}')">${f.label}</button>`
        ).join('');
      }

      let actionHtml = '';
      if (c.status === 'ready') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Baixar</button>${qualityChips}`;
      } else if (c.status === 'downloading') {
        const pct = c.progress ? ` ${c.progress}%` : '';
        actionHtml = `<span class="card-status downloading"><span class="spin"></span> Baixando...${pct}</span>`;
      } else if (c.status === 'done') {
        const buttonLabel = c.savedPath ? 'Salvo' : 'Salvar';
        const statusClass = c.savedPath ? 'saved' : 'done';
        const statusText = c.savedPath || c.filename || '';
        actionHtml = `<button class="card-dl-btn done" onclick="saveCard(${idx})">${buttonLabel}</button>
          <span class="card-status ${statusClass}" title="${esc(statusText)}">${esc(statusText)}</span>`;
      } else if (c.status === 'error') {
        actionHtml = `<button class="card-dl-btn error" onclick="dlCard(${idx})">Tentar de novo</button>
          <span class="card-status error">${esc(friendlyError(c.error || 'Falha no download'))}</span>`;
      }

      el.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-title" title="${esc(c.title || 'Sem título')}">${esc(c.title || 'Sem título')}</div>
          <div class="card-meta">${esc(c.uploader)}${c.duration ? ' · ' + fmtDur(c.duration) : ''}</div>
          <div class="card-actions">${actionHtml}</div>
        </div>
      `;
    }

    function renderDownloadAll() {
      const existing = document.getElementById('dl-all-bar');
      if (existing) existing.remove();

      const bar = document.createElement('div');
      bar.id = 'dl-all-bar';
      bar.className = 'dl-all-bar';
      bar.innerHTML = `<button class="dl-all-btn" onclick="dlAll()">Baixar tudo</button>`;
      document.getElementById('cards').appendChild(bar);
    }

    function pickFormat(idx, formatId) {
      cardData[idx].selectedFormatId = formatId;
      renderCard(idx);
    }

    async function dlCard(idx) {
      const c = cardData[idx];
      c.status = 'downloading';
      c.error = null;
      c.progress = 0;
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: c.selectedFormatId,
            title: c.title || '',
          }),
        });
        const data = await res.json();
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        await pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    function pollCard(idx) {
      return new Promise(resolve => {
        const c = cardData[idx];
        const iv = setInterval(async () => {
          try {
            const res = await fetch(`/api/status/${c.jobId}`);
            const data = await res.json();
            if (data.status === 'done') {
              clearInterval(iv);
              c.status = 'done';
              c.filename = data.filename;
              renderCard(idx);
              saveCard(idx);
              resolve();
            } else if (data.status === 'error') {
              clearInterval(iv);
              c.status = 'error';
              c.error = data.error;
              renderCard(idx);
              resolve();
            } else if (data.progress) {
              c.progress = data.progress;
              renderCard(idx);
            }
          } catch {
            clearInterval(iv);
            c.status = 'error';
            c.error = 'Conexão com o servidor perdida';
            renderCard(idx);
            resolve();
          }
        }, 1000);
      });
    }

    async function saveCard(idx) {
      const c = cardData[idx];
      if (!c.jobId) return;

      if (window.pywebview?.api?.save_download) {
        try {
          const result = await window.pywebview.api.save_download(c.jobId);
          if (result?.saved) {
            c.savedPath = result.path || c.filename || '';
            renderCard(idx);
          } else if (result?.error) {
            c.status = 'error';
            c.error = result.error;
            renderCard(idx);
          }
          return;
        } catch (err) {
          c.status = 'error';
          c.error = err.message || 'Não foi possível salvar o arquivo';
          renderCard(idx);
          return;
        }
      }

      const a = document.createElement('a');
      a.href = `/api/file/${c.jobId}`;
      a.download = c.filename || '';
      a.click();
    }

    async function dlAll() {
      const btn = document.querySelector('.dl-all-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Baixando...'; }

      const promises = cardData
        .map((c, i) => c.status === 'ready' ? dlCard(i) : null)
        .filter(Boolean);
      await Promise.all(promises);

      if (btn) { btn.disabled = false; btn.textContent = 'Baixar tudo'; }
    }
  </script>
</body>
</html>
